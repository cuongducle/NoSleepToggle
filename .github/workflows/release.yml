name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version metadata
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        shell: bash
        run: |
          chmod +x scripts/build_app.sh
          APP_VERSION="${{ steps.version.outputs.version }}" \
          APP_BUILD="${{ steps.version.outputs.build }}" \
          ./scripts/build_app.sh

      - name: Build DMG
        shell: bash
        run: |
          chmod +x scripts/create_dmg.sh
          APP_VERSION="${{ steps.version.outputs.version }}" \
          APP_BUILD="${{ steps.version.outputs.build }}" \
          ./scripts/create_dmg.sh

      - name: Package app bundle
        shell: bash
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent dist/NoSleepToggle.app "artifacts/NoSleepToggle-${{ steps.version.outputs.version }}.zip"
          cp "release/NoSleepToggle.dmg" "artifacts/NoSleepToggle-${{ steps.version.outputs.version }}.dmg"

      - name: Publish release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NoSleepToggle-${{ steps.version.outputs.version }}.zip
            artifacts/NoSleepToggle-${{ steps.version.outputs.version }}.dmg
